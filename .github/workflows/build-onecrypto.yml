# SPDX-License-Identifier: BSD-2-Clause-Patent
##

name: Build OneCryptoPkg

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'OneCryptoPkg/**'
      - 'OpensslPkg/**'
      - 'PlatformBuild.py'
      - 'package_onecrypto.py'
      - '.github/workflows/build-onecrypto.yml'
  push:
    branches:
      - main
    paths:
      - 'OneCryptoPkg/**'
      - 'OpensslPkg/**'
      - 'PlatformBuild.py'
      - 'package_onecrypto.py'
      - '.github/workflows/build-onecrypto.yml'

env:
  TOOL_CHAIN_TAG: CLANGPDB

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/microsoft/mu_devops/ubuntu-24-dev:8b4aa53

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Safe Directory
        run: git config --global --add safe.directory '*'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pip-requirements.txt

      - name: Setup
        run: stuart_setup -c PlatformBuild.py

      - name: CI Setup
        run: stuart_ci_setup -c PlatformBuild.py

      - name: Update
        run: stuart_update -c PlatformBuild.py

      - name: Build OneCryptoPkg DEBUG (${{ env.TOOL_CHAIN_TAG }})
        run: |
          python PlatformBuild.py -t DEBUG --skip-packaging TOOL_CHAIN_TAG=${{ env.TOOL_CHAIN_TAG }}

      - name: Build OneCryptoPkg RELEASE (${{ env.TOOL_CHAIN_TAG }})
        run: |
          python PlatformBuild.py -t RELEASE --skip-packaging TOOL_CHAIN_TAG=${{ env.TOOL_CHAIN_TAG }}

      - name: Package OneCrypto Drivers (DEBUG + RELEASE)
        run: |
          python OneCryptoPkg/Scripts/package_onecrypto.py --toolchain ${{ env.TOOL_CHAIN_TAG }} --target DEBUG,RELEASE

      - name: Upload OneCrypto Driver Package (DEBUG + RELEASE)
        uses: actions/upload-artifact@v4
        with:
          name: OneCrypto-Drivers
          path: Build/OneCrypto_Drivers_*.zip

      - name: Upload PDB Files
        uses: actions/upload-artifact@v4
        with:
          name: OneCrypto-PDBs
          path: Build/OneCryptoPkg/*/PDB/

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OneCrypto-${{ env.TOOL_CHAIN_TAG }}-logs
          path: |
            Build/*.txt
            Build/**/*.txt
