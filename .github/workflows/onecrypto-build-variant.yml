name: OneCrypto Build Variant

on:
  workflow_call:
    inputs:
      variant:
        required: true
        type: string
      bld_flags:
        required: true
        type: string
      tool_chain_tag:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/microsoft/mu_devops/ubuntu-24-dev:8b4aa53

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Safe Directory
        run: git config --global --add safe.directory '*'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pip-requirements.txt

      - name: Setup
        run: stuart_setup -c PlatformBuild.py

      - name: CI Setup
        run: stuart_ci_setup -c PlatformBuild.py

      - name: Update
        run: stuart_update -c PlatformBuild.py

      - name: Build OneCryptoPkg (${{ inputs.variant }})
        shell: bash
        env:
          RAW_VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
        run: |
          # If a release tag is available, strip a leading 'v'/'V' and reduce
          # to a bare X.Y.Z semver core. Otherwise omit --version entirely.
          VERSION_ARG=""
          if [[ -n "$RAW_VERSION" ]]; then
            CLEAN_VERSION=$(echo "$RAW_VERSION" | sed -E 's/^[vV]//' | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+' || true)
            echo "Raw version:   $RAW_VERSION"
            echo "Clean version: ${CLEAN_VERSION:-<none>}"
            if [[ -n "$CLEAN_VERSION" ]]; then
              VERSION_ARG="--version $CLEAN_VERSION"
            fi
          else
            echo "No release tag available; building without --version."
          fi
          python PlatformBuild.py $VERSION_ARG TOOL_CHAIN_TAG=${{ inputs.tool_chain_tag }} ${{ inputs.bld_flags }}

      - name: unzip to staging
        run: |
          mkdir -p staging
          unzip -o Build/OneCryptoPkg/OneCrypto-Drivers.zip -d staging

      - name: Upload Build Outputs (${{ inputs.variant }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: onecrypto-package-${{ inputs.variant }}
          path: staging/
